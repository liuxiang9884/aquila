[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/lead_lag_ordi_replay.log"
console_sink_name = "lead_lag_ordi_replay_console"
backend_thread_name = "lead_lag_ordi_replay_log"
backend_cpu_affinity = 5
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[strategy]
name = "lead_lag"
strategy_id = 4
mode = "dry_run"
order_capacity = 8
config = "config/strategy/lead_lag_ordi.toml"

[strategy.loop]
idle_policy = "spin"
bind_cpu_id = -1
max_loop_seconds = 0

[strategy.data_reader]
config = "config/data_readers/lead_lag_ordi_binary_replay.toml"

[strategy.order_session]
config = "config/order_sessions/gate_order_session.toml"

[strategy.feedback]
enabled = false
poll_budget = 32
force_claim = false
