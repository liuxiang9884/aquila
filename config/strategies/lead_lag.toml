[lead_lag]
name = "lead_lag"
version = "1.0"

[[lead_lag.pairs]]
symbol = "BTC_USDT"
symbol_id = 0
lead_exchange = "binance"
lag_exchange = "gate"
lag_taker_fee = 0.00016
max_lead_freshness_ms = 5
max_lag_freshness_ms = 20

[lead_lag.pairs.trigger]
lead = 0.0025
close = 0.0005
lag_part = 0.5
target_profit_rate = 0.0
drift_limit = 0.02
drift_period = "1m"
drift_min_samples = 20
drift_warmup = "30s"

[lead_lag.pairs.trigger.quantile]
move = 0.75
up_min = 0.0
up_max = 0.02
down_min = -0.02
down_max = 0.0
precision = 0.000001

[lead_lag.pairs.execute]
open_notional = 100.0
trailing_stop = 0.01
max_entry_spread = 0.01
parallel = 1

[lead_lag.pairs.bbo_record]
window = "1s"
stats_window = "30s"

[lead_lag.pairs.capacity]
extrema_window_capacity = 16384
move_queue_capacity = 16384
noise_window_capacity = 16384
spread_window_capacity = 16384
