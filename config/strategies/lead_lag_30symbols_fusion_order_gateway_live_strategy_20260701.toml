[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/lead_lag_strategy_30symbols_fusion_order_gateway_live_20260701.log"
console_sink_name = "lead_lag_strategy_30symbols_fusion_order_gateway_live_20260701_console"
backend_thread_name = "lead_lag_strategy_30symbols_fusion_order_gateway_live_20260701_log"
