[lead_lag]
name = "lead_lag"
version = "1.0"

[lead_lag.risk]
max_gross_notional = 1000.0

[[lead_lag.pairs]]
symbol = "BTC_USDT"
symbol_id = 93
lead_exchange = "binance"
lag_exchange = "bitget"
lag_taker_fee = 0.00015
max_lead_freshness_ms = 3
max_lag_freshness_ms = 200

[lead_lag.pairs.trigger]
lead = 0.0025
close = 0.0005
lag_part = 0.5
target_profit_rate = 0.0
drift_period = "1m"
drift_min_samples = 20
drift_warmup = "30s"

[lead_lag.pairs.trigger.drift_guard]
enabled = true
drift_instant = 0.015
ratio_std = 0.008
ratio_std_window = "1m"
drift_mean = 0.02
drift_mean_window = "1m"

[lead_lag.pairs.trigger.quantile]
move = 0.75
up_min = 0.0
up_max = 0.02
down_min = -0.02
down_max = 0.0
precision = 0.000001

[lead_lag.pairs.execute]
open_notional = 10.0
trailing_stop = 0.01
max_entry_spread = 0.01
open_slippage_ticks = 131
close_slippage_ticks = 131
stoploss_slippage_ticks = 328
close_retry_times = 2
close_retry_slippage_step_ticks = 131
parallel = 1
order_session_fanout = 4

[lead_lag.pairs.bbo_record]
window = "1s"
stats_window = "30s"

[lead_lag.pairs.capacity]
extrema_window_capacity = 16384
move_queue_capacity = 16384
noise_window_capacity = 16384
spread_window_capacity = 16384
drift_guard_window_capacity = 131072

