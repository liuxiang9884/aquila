[instrument_catalog]
file = "config/instruments/usdt_futures.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/gate_account_tui_market_data.log"
console_sink_name = "gate_account_tui_market_data_console"
backend_thread_name = "gate_account_tui_market_data_log"
backend_cpu_affinity = 5
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_reader]
name = "gate_account_tui_market_data"
max_events_per_drain = 128

[data_reader.execution_policy]
bind_cpu_id = 4
idle_policy = "spin"

[[data_reader.sources]]
name = "gate_book_ticker_monitor"
type = "shm"
exchange = "gate"
feed = "book_ticker"
shm_name = "aquila_gate_market_data_requested_20260521"
channel_name = "book_ticker_channel"
start_position = "latest"
read_mode = "drain"
required = false

[[data_reader.sources]]
name = "binance_book_ticker_monitor"
type = "shm"
exchange = "binance"
feed = "book_ticker"
shm_name = "aquila_binance_market_data_requested_20260521"
channel_name = "book_ticker_channel"
start_position = "latest"
read_mode = "drain"
required = false
