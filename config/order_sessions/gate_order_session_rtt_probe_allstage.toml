[order_session]
name = "gate_order_session_rtt_probe_allstage"
settle = "usdt"

[order_session.diagnostics]
enable_tcp_info = true
ack_rtt_threshold_ns = 0
send_to_first_drive_read_threshold_ns = 3000000
drive_read_duration_threshold_ns = 1000000
diagnostic_window_timeout_ns = 250000000
max_logs_per_second = 100

[order_session.credentials]
api_key_env = "GATE_PROBE_KEY"
api_secret_env = "GATE_PROBE_SECRET"

[order_session.websocket.endpoint]
host = "fx-ws.gateio.ws"
enable_tls = true

[order_session.websocket.execution_policy]
bind_cpu_id = 4
