[instrument_catalog]
file = "config/instruments/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/binance_data_session_30symbols_20260604.log"
console_sink_name = "binance_data_session_30symbols_console"
backend_thread_name = "binance_data_session_30symbols_log"
backend_cpu_affinity = 5
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_session]
name = "binance_data_session_30symbols_20260604"
subscribe_symbols = ["CLO_USDT", "SLX_USDT", "AIA_USDT", "WLD_USDT", "PIEVERSE_USDT", "OPN_USDT", "LIT_USDT", "MYX_USDT", "ENA_USDT", "STO_USDT", "ICP_USDT", "UB_USDT", "BEAT_USDT", "XPL_USDT", "FARTCOIN_USDT", "ZEC_USDT", "SKYAI_USDT", "VIRTUAL_USDT", "EPIC_USDT", "INJ_USDT", "PENGU_USDT", "H_USDT", "NEAR_USDT", "XLM_USDT", "FIL_USDT", "ONDO_USDT", "SUI_USDT", "WIF_USDT", "FET_USDT"]
market = "um_futures"
feed = "book_ticker"

[data_session.websocket.endpoint]
host = "fstream.binance.com"

[data_session.websocket.execution_policy]
bind_cpu_id = 3

[data_shm_sink]
enabled = true
shm_name = "aquila_binance_market_data_30symbols_20260604"
channel_name = "book_ticker_channel"
create = true
remove_existing = true
