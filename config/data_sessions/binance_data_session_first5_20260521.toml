[instrument_catalog]
file = "config/instruments/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/binance_data_session_first5_20260521.log"
console_sink_name = "binance_data_session_first5_console"
backend_thread_name = "binance_data_session_first5_log"
backend_cpu_affinity = 5
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_session]
name = "binance_data_session_first5"
subscribe_symbols = ["PROVE_USDT", "RAVE_USDT", "ZEC_USDT", "SIREN_USDT", "ETC_USDT"]
market = "um_futures"
feed = "book_ticker"

[data_session.websocket.endpoint]
host = "fstream.binance.com"

[data_session.websocket.execution_policy]
bind_cpu_id = 3

[data_shm_sink]
enabled = true
shm_name = "aquila_binance_market_data_first5_20260521"
channel_name = "book_ticker_channel"
create = true
remove_existing = true
