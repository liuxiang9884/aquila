[instrument_catalog]
file = "config/instruments/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/gate_data_session_30symbols_private_plain_20260701.log"
console_sink_name = "gate_data_session_30symbols_private_plain_20260701_console"
backend_thread_name = "gate_data_session_30symbols_private_plain_20260701_log"
backend_cpu_affinity = 1
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_session]
name = "gate_data_session_30symbols_private_plain_20260701"
subscribe_symbols = ["BTC_USDT", "SOL_USDT", "DOGE_USDT", "XRP_USDT", "HYPE_USDT", "TAC_USDT", "ZEC_USDT", "ORDI_USDT", "AIGENSYN_USDT", "WLD_USDT", "SLX_USDT", "UB_USDT", "VELVET_USDT", "BTW_USDT", "RAVE_USDT", "SUI_USDT", "AVAX_USDT", "ENA_USDT", "BAS_USDT", "H_USDT", "LINK_USDT", "RE_USDT", "IN_USDT", "AAVE_USDT", "XLM_USDT", "GWEI_USDT", "NEAR_USDT", "AGLD_USDT", "UNI_USDT", "BCH_USDT"]
settle = "usdt"
wire_format = "sbe"
sbe_schema_id = 1
feed = "book_ticker"

[data_session.websocket.endpoint]
host = "fxws-private.gateapi.io"
connect_ip = "10.0.1.154"
port = "80"
enable_tls = false

[data_session.websocket.execution_policy]
bind_cpu_id = 8

[data_shm_sink]
enabled = true
shm_name = "aquila_gate_market_data_30symbols_20260701"
channel_name = "book_ticker_channel"
create = true
remove_existing = true
