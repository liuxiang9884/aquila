[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/bitget_data_fusion_trade_4sources.log"
console_sink_name = "bitget_data_fusion_trade_4sources_console"
backend_thread_name = "bitget_data_fusion_trade_log"
backend_cpu_affinity = -1
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[launch]
name = "bitget_data_fusion_trade_4sources"
feeds = ["trade"]

[launch.fusion_configs]
trade = "config/market_data_fusion/bitget_trade_fusion_4sources.toml"

[[launch.sources]]
source_id = 0
data_session_config = "config/data_sessions/bitget_data_session.toml"
data_session_name = "bitget_trade_source_0"
data_shm_name = "aquila_bitget_trade_src_0"
trade_channel_name = "trade_channel"
remove_existing_source_shm = true
bind_cpu_id = 17

