[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/gate_data_fusion_book_ticker_trade_4sources.log"
console_sink_name = "gate_data_fusion_book_ticker_trade_4sources_console"
backend_thread_name = "gate_data_fusion_book_ticker_trade_log"
backend_cpu_affinity = 31
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[launch]
name = "gate_data_fusion_book_ticker_trade_4sources"
feeds = ["book_ticker", "trade"]

