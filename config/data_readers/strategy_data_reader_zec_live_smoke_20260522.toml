[instrument_catalog]
file = "config/instruments/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/strategy_data_reader_zec_live_smoke_20260522.log"
console_sink_name = "strategy_data_reader_zec_live_smoke_console"
backend_thread_name = "strategy_data_reader_zec_live_smoke_log"
backend_cpu_affinity = 5
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_reader]
name = "strategy_data_reader_zec_live_smoke"
max_events_per_drain = 128

[data_reader.execution_policy]
bind_cpu_id = 4
idle_policy = "spin"

[[data_reader.sources]]
name = "gate_book_ticker_zec_live_smoke"
type = "shm"
exchange = "gate"
feed = "book_ticker"
shm_name = "aquila_gate_market_data_zec_live_smoke_20260522"
channel_name = "book_ticker_channel"
start_position = "latest"
read_mode = "latest"
required = true
