[instrument_catalog]
file = "config/instruments/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/bitget_book_ticker_fusion_source1_recorder.log"
console_sink_name = "bitget_book_ticker_fusion_source1_recorder_console"
backend_thread_name = "bitget_book_ticker_fusion_source1_recorder_log"
backend_cpu_affinity = -1
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_reader]
name = "bitget_book_ticker_fusion_4sources_source1_recorder"
max_events_per_drain = 1024

[data_reader.execution_policy]
bind_cpu_id = -1
idle_policy = "spin"

[[data_reader.sources]]
name = "bitget_source_1"
type = "shm"
exchange = "bitget"
feed = "book_ticker"
shm_name = "aquila_bitget_book_ticker_src_1"
channel_name = "book_ticker_channel"
start_position = "latest"
read_mode = "drain"
required = true

[recorder]
rotation_enabled = true
rotation_interval_sec = 3600
output_dir = "/home/liuxiang/tmp/bitget_book_ticker_fusion_4sources/source1/book_ticker_segments"
file_prefix = "bitget_book_ticker_fusion_4sources_source1"
manifest_path = "/home/liuxiang/tmp/bitget_book_ticker_fusion_4sources/source1/book_ticker_manifest.jsonl"
trade_output_dir = "/home/liuxiang/tmp/bitget_book_ticker_fusion_4sources/source1/trade_segments"
trade_file_prefix = "bitget_trade_fusion_4sources_source1"
trade_manifest_path = "/home/liuxiang/tmp/bitget_book_ticker_fusion_4sources/source1/trade_manifest.jsonl"
