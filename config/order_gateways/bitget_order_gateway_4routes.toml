[log]
log_level = "info"
file_sink_name = "/home/liuxiang/log/bitget_order_gateway_4routes.log"
console_sink_name = "bitget_order_gateway_4routes_console"
backend_thread_name = "bitget_order_gateway_4routes_log"
backend_cpu_affinity = 0
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[bitget_account_command_rate_limit]
enabled = true
max_commands_per_second = 5
reserved_exit_commands = 2

[order_gateway]
name = "bitget_order_gateway_4routes"
shm_name = "aquila_bitget_order_gateway_4routes"
route_count = 4
command_queue_capacity = 4096
event_queue_capacity = 8192
startup_ready_timeout_s = 30

[[order_gateway.routes]]
name = "route0"
order_session_config = "config/order_sessions/bitget_order_session.toml"
worker_cpu_id = 16

[[order_gateway.routes]]
name = "route1"
order_session_config = "config/order_sessions/bitget_order_session.toml"
worker_cpu_id = 17

[[order_gateway.routes]]
name = "route2"
order_session_config = "config/order_sessions/bitget_order_session.toml"
worker_cpu_id = 18

[[order_gateway.routes]]
name = "route3"
order_session_config = "config/order_sessions/bitget_order_session.toml"
worker_cpu_id = 19
