[instrument_catalog]
file = "/home/liuxiang/tmp/bitget_lead_lag_top20_20260715T125649Z/inputs/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/tmp/bitget_lead_lag_top20_20260715T125649Z/logs/strategy.log"
console_sink_name = "bitget_lead_lag_data_reader_console"
backend_thread_name = "bitget_lead_lag_data_reader_log"
backend_cpu_affinity = 5
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_reader]
name = "bitget_lead_lag_top20_fusion_reader"
max_events_per_drain = 128

[data_reader.execution_policy]
bind_cpu_id = 4
idle_policy = "spin"

[[data_reader.sources]]
name = "bitget_top20_fusion"
type = "shm"
exchange = "bitget"
feed = "book_ticker"
shm_name = "aquila_bgll_125649_bitget_fusion"
channel_name = "book_ticker_channel"
start_position = "latest"
read_mode = "latest"
required = true

[[data_reader.sources]]
name = "binance_top20_fusion"
type = "shm"
exchange = "binance"
feed = "book_ticker"
shm_name = "aquila_bgll_125649_binance_fusion"
channel_name = "book_ticker_channel"
start_position = "latest"
read_mode = "latest"
required = true
