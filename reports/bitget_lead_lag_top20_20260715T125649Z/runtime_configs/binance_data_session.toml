[instrument_catalog]
file = "/home/liuxiang/tmp/bitget_lead_lag_top20_20260715T125649Z/inputs/usdt_future_universe.csv"
schema = "aquila.instrument.v1"

[log]
log_level = "info"
file_sink_name = "/home/liuxiang/tmp/bitget_lead_lag_top20_20260715T125649Z/logs/binance_data_fusion.log"
console_sink_name = "binance_data_session_console"
backend_thread_name = "binance_data_session_log"
backend_cpu_affinity = 1
format_pattern = "%(log_level_short_code)%(time) %(process_id):%(thread_id) %(file_name):%(caller_function):%(line_number)] %(message)"
timestamp_pattern = "%Y-%m-%d %H:%M:%S.%Qns"

[data_session]
name = "binance_top20_source"
subscribe_symbols = ["BTC_USDT", "SOL_USDT", "DOGE_USDT", "XRP_USDT", "HYPE_USDT", "TAC_USDT", "ZEC_USDT", "ORDI_USDT", "WLD_USDT", "SLX_USDT", "UB_USDT", "VELVET_USDT", "BTW_USDT", "RAVE_USDT", "SUI_USDT", "AVAX_USDT", "ENA_USDT", "BAS_USDT", "H_USDT", "LINK_USDT"]
market = "um_futures"
feed = "book_ticker"

[data_session.websocket.endpoint]
host = "fstream.binance.com"

[data_session.websocket.execution_policy]
bind_cpu_id = 12

[data_shm_sink]
enabled = true
shm_name = "aquila_bgll_binance_source"
channel_name = "book_ticker_channel"
create = true
remove_existing = true
